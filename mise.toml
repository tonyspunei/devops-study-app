[tools]
flux2 = "latest"
gh = "latest"
k3d = "latest"
pre-commit = "latest"
python = "3.13"
ruff = "latest"
trivy = "latest"
uv = "latest"

[settings]
python.uv_venv_auto = true
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[env]
APP_REPO = 'devops-study-app'
GITUSER = 'tonyspunei'
GITOPS_REPO = 'devops-study-app-gitops'

[hooks]
enter = "bash ./scripts/setup_project"

[tasks.k8s-setup-local]
description = "Set up a Kubernetes cluster that builds the local images and applies them"
run = "bash ./kubernetes/setup_cluster_local"

[tasks.k8s-setup-minimal]
description = "Set up a minimal Kubernetes cluster"
run = "bash ./kubernetes/k8s-setup-minimal"

[tasks.e2e-test]
description = "Run end-to-end tests"
run = "cd ./kubernetes && uv run e2e_test.py"

[tasks.setup-deploy-key]
description = "Set up a deploy key for the GitOps repo"
run = "bash ./scripts/setup_deploy_key"

[tasks.k8s-setup-gitops]
description = "Set up a cluster configured with GitOps using Flux"
run = "bash ./kubernetes/setup_cluster_gitops"